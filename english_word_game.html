<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Word Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .card-pop {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-pop:active {
            transform: scale(0.95);
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card-pop:hover .emoji-animate {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }

        .sparkle-effect {
            position: absolute;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 0.6s ease-out forwards;
        }
    </style>
</head>

        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;

            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            if (availableVoices.length === 0) return;

            let filteredVoices = [];
            if (targetLanguage === 'be') {
                filteredVoices = availableVoices.filter(voice => 
                    voice.lang.startsWith('be') || voice.lang.startsWith('uk') || voice.lang.startsWith('ru')
                );
            } else if (targetLanguage === 'uk') {
                filteredVoices = availableVoices.filter(voice => 
                    voice.lang.startsWith('uk')
                );
            } else {
                filteredVoices = availableVoices.filter(voice => voice.lang.startsWith(targetLanguage));
            }

            const voicesToShow = filteredVoices.length > 0 ? filteredVoices : availableVoices;
            voiceSelect.innerHTML = ''; 

            voicesToShow.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speakWord(item) {
            window.speechSynthesis.cancel();
            
            let textToSpeak = item[targetLanguage];
            
            // Fix for ALL letters so it says the letter instead of "Capital/Велика літера"
            if (currentCategory === 'letters') {
                textToSpeak = textToSpeak.toLowerCase(); 
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            utterance.rate = 0.85; 
            utterance.pitch = 1.1;

            const voiceSelect = document.getElementById('voice-select');
            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                utterance.lang = selectedVoice.lang;
            } else {
                utterance.lang = targetLanguage === 'en' ? 'en-US' : (targetLanguage === 'uk' ? 'uk-UA' : 'be-BY');
            }

            window.speechSynthesis.speak(utterance);
        }

        function showWordText(item) {
            const wordElement = document.getElementById('current-word');
            const translationElement = document.getElementById('current-translation');
            
            if (targetLanguage === 'en') {
                wordElement.className = "text-3xl md:text-5xl font-black text-blue-500 transition-opacity duration-300 drop-shadow-sm mb-1 leading-none";
            } else if (targetLanguage === 'uk') {
                wordElement.className = "text-3xl md:text-5xl font-black text-yellow-500 transition-opacity duration-300 drop-shadow-sm mb-1 leading-none";
            } else {
                wordElement.className = "text-3xl md:text-5xl font-black text-red-500 transition-opacity duration-300 drop-shadow-sm mb-1 leading-none";
            }

            wordElement.textContent = item[targetLanguage];
            wordElement.style.opacity = 1;
            
            // If learning Ukrainian, show English in brackets instead of Ukrainian
            const secondaryText = targetLanguage === 'uk' ? item.en : item.uk;
            translationElement.textContent = secondaryText;
            translationElement.style.opacity = 1;

            if (window.wordTimeout) clearTimeout(window.wordTimeout);

            window.wordTimeout = setTimeout(() => {
                wordElement.style.opacity = 0;
                translationElement.style.opacity = 0;
            }, 2500);
        }

        function createSparkles(e, card) {
            for (let i = 0; i < 3; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-effect';
                
                const rect = card.getBoundingClientRect();
                let x, y;
                
                // Якщо є подія миші/дотику - іскри з'являються під пальцем, інакше (клавіатура) - по центру картки
                if (e && e.clientX) {
                    x = e.clientX - rect.left + (Math.random() * 40 - 20);
                    y = e.clientY - rect.top + (Math.random() * 40 - 20);
                } else {
                    x = rect.width / 2 + (Math.random() * 40 - 20);
                    y = rect.height / 2 + (Math.random() * 40 - 20);
                }
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                
                card.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);
            }
        }

        function renderHomeCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            Object.values(gameData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `${cat.color} rounded-3xl p-4 md:p-8 border-b-8 shadow-xl flex flex-col items-center justify-center gap-2 md:gap-4 transform hover:scale-105 active:scale-95 transition-transform`;
                
                const emoji = cat.title.split(' ')[0];
                const text = cat.title.substring(2);

                btn.innerHTML = `
                    <span class="text-6xl md:text-8xl drop-shadow-md">${emoji}</span>
                    <span class="text-xl md:text-3xl font-black tracking-wide">${text}</span>
                `;
                
                btn.onclick = () => {
                    currentCategory = cat.id;
                    currentLetterPage = 0; 
                    document.getElementById('home-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    document.getElementById('game-screen').classList.add('flex');
                    renderGrid();
                };
                
                grid.appendChild(btn);
            });
        }

        function renderGrid() {
            const gridContainer = document.getElementById('game-grid');
            gridContainer.innerHTML = '';
            
            const categoryData = gameData[currentCategory];
            const allItems = categoryData.getItems ? categoryData.getItems(targetLanguage) : categoryData.items;

            let itemsToRender = allItems;
            let gridClass = "grid gap-2 md:gap-4 flex-1 min-h-0 w-full auto-rows-fr ";
            
            const paginationControls = document.getElementById('pagination-controls');

            // Handle Pagination for letters
            if (currentCategory === 'letters') {
                const totalPages = Math.ceil(allItems.length / ITEMS_PER_PAGE);
                itemsToRender = allItems.slice(currentLetterPage * ITEMS_PER_PAGE, (currentLetterPage + 1) * ITEMS_PER_PAGE);
                
                // 2x3 or 3x2 grid for 6 large items
                gridClass += "grid-cols-2 grid-rows-3 md:grid-cols-3 md:grid-rows-2";
                
                paginationControls.classList.remove('hidden');
                document.getElementById('page-indicator').textContent = `${currentLetterPage + 1} / ${totalPages}`;
                document.getElementById('prev-page-btn').disabled = currentLetterPage === 0;
                document.getElementById('next-page-btn').disabled = currentLetterPage >= totalPages - 1;
            } else {
                gridClass += "grid-cols-3 grid-rows-4 md:grid-cols-4 md:grid-rows-3"; // 12 items standard
                paginationControls.classList.add('hidden');
            }
            
            gridContainer.className = gridClass;

            itemsToRender.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = `card-pop w-full h-full relative overflow-hidden bg-white rounded-2xl md:rounded-3xl border-4 border-white shadow-md flex flex-col items-center justify-center p-1 md:p-3 group`;
                
                let borderColor = '#fde047'; 
                if(currentCategory === 'vegetables') borderColor = '#86efac';
                if(currentCategory === 'fruits') borderColor = '#fca5a5';
                if(currentCategory === 'toys') borderColor = '#c084fc';
                if(currentCategory === 'transport') borderColor = '#60a5fa';
                if(currentCategory === 'clothes') borderColor = '#f472b6';
                if(currentCategory === 'letters') borderColor = '#fdba74';
                
                card.style.borderColor = borderColor;
                card.style.animation = `bounce-in 0.4s ease-out ${index * 0.05}s both`;

                // If learning Ukrainian, show English in brackets instead of Ukrainian
                const secondaryText = targetLanguage === 'uk' ? item.en : item.uk;

                if (currentCategory === 'letters') {
                    // Huge letters since there are only 6 per page
                    card.innerHTML = `
                        <div class="absolute inset-0 opacity-0 group-hover:opacity-5 bg-black transition-opacity"></div>
                        <span class="emoji-animate text-6xl sm:text-7xl md:text-8xl lg:text-9xl font-black text-gray-800">${item.emoji}</span>
                        <div class="flex flex-col items-center leading-tight w-full px-1 mt-2">
                            <span class="text-sm md:text-lg font-bold text-gray-400">(${secondaryText})</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="absolute inset-0 opacity-0 group-hover:opacity-5 bg-black transition-opacity"></div>
                        <span class="emoji-animate text-5xl sm:text-6xl md:text-7xl mb-1">${item.emoji}</span>
                        <div class="flex flex-col items-center leading-tight w-full px-1">
                            <span class="text-base sm:text-lg md:text-xl font-black text-gray-800 capitalize truncate w-full text-center">${item[targetLanguage]}</span>
                            <span class="text-xs sm:text-sm md:text-base font-bold text-gray-400">(${secondaryText})</span>
                        </div>
                    `;
                }

                card.onclick = (e) => {
                    speakWord(item);
                    showWordText(item);
                    createSparkles(e, card);
                };

                gridContainer.appendChild(card);
            });
        }

        document.getElementById('back-btn').onclick = () => {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('flex');
            
            document.getElementById('current-word').style.opacity = 0;
            document.getElementById('current-translation').style.opacity = 0;
        };

        document.getElementById('prev-page-btn').onclick = () => {
            if (currentLetterPage > 0) {
                currentLetterPage--;
                renderGrid();
            }
        };

        document.getElementById('next-page-btn').onclick = () => {
            const categoryData = gameData[currentCategory];
            const allItems = categoryData.getItems ? categoryData.getItems(targetLanguage) : categoryData.items;
            const totalPages = Math.ceil(allItems.length / ITEMS_PER_PAGE);
            
            if (currentLetterPage < totalPages - 1) {
                currentLetterPage++;
                renderGrid();
            }
        };

        window.onload = () => {
            window.speechSynthesis.getVoices();
            populateVoiceList();
            
            renderHomeCategories();

            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => modal.classList.remove('hidden');
            document.getElementById('close-settings').onclick = () => modal.classList.add('hidden');
            
            const nameInput = document.getElementById('child-name-input');
            const displayName = document.getElementById('display-name');
            
            // Виправлена помилка з дужкою:
            nameInput.addEventListener('input', (e) => {
                displayName.textContent = e.target.value.trim() || 'Мія';
            }); 

            // Language change logic
            document.getElementById('language-select').onchange = (e) => {
                targetLanguage = e.target.value;
                currentLetterPage = 0; 
                populateVoiceList();
                if (!document.getElementById('game-screen').classList.contains('hidden')) {
                    renderGrid(); 
                }
            };
        };

        // --- ДОДАНО: ПІДТРИМКА КЛАВІАТУРИ ---
        document.addEventListener('keydown', (e) => {
            // Ігноруємо натискання, якщо дитина щось вводить у текстове поле (наприклад, ім'я)
            if (e.target.tagName === 'INPUT') return;

            const isGameScreenActive = !document.getElementById('game-screen').classList.contains('hidden');
            const isSettingsActive = !document.getElementById('settings-modal').classList.contains('hidden');

            // 1. Кнопка Escape - вихід з гри або закриття налаштувань
            if (e.key === 'Escape') {
                if (isSettingsActive) {
                    document.getElementById('close-settings').click();
                } else if (isGameScreenActive) {
                    document.getElementById('back-btn').click();
                }
                return;
            }

            // 2. Стрілки - гортання сторінок з літерами
            if (isGameScreenActive && currentCategory === 'letters') {
                if (e.key === 'ArrowLeft' && currentLetterPage > 0) {
                    document.getElementById('prev-page-btn').click();
                    return;
                }
                if (e.key === 'ArrowRight') {
                    const allLetters = gameData.letters.getItems(targetLanguage);
                    const totalPages = Math.ceil(allLetters.length / ITEMS_PER_PAGE);
                    if (currentLetterPage < totalPages - 1) {
                        document.getElementById('next-page-btn').click();
                    }
                    return;
                }
            }

            // 3. Натискання букв (Магія пошуку)
            if (isGameScreenActive && e.key.length === 1) {
                const pressedChar = e.key.toLowerCase();
                let categoryData = currentCategory === 'letters' 
                    ? gameData.letters.getItems(targetLanguage) 
                    : gameData[currentCategory].items;

                let itemIndex = -1;

                if (currentCategory === 'letters') {
                    // Для літер: шукаємо точний збіг символу (враховуючи мову розкладки)
                    itemIndex = categoryData.findIndex(item => item.emoji.toLowerCase() === pressedChar);
                } else {
                    // Для інших категорій: шукаємо перше слово, що починається на цю літеру
                    itemIndex = categoryData.findIndex(item => item[targetLanguage].toLowerCase().startsWith(pressedChar));
                }

                if (itemIndex !== -1) {
                    // Якщо ми в літерах, перевіряємо чи треба перегорнути сторінку
                    if (currentCategory === 'letters') {
                        const targetPage = Math.floor(itemIndex / ITEMS_PER_PAGE);
                        if (currentLetterPage !== targetPage) {
                            currentLetterPage = targetPage;
                            renderGrid();
                        }
                    }

                    // Знаходимо потрібну картку на екрані
                    const cards = document.querySelectorAll('#game-grid .card-pop');
                    const cardIndexOnScreen = currentCategory === 'letters' ? itemIndex % ITEMS_PER_PAGE : itemIndex;
                    const targetCard = cards[cardIndexOnScreen];

                    if (targetCard) {
                        // Візуальна анімація "натискання" клавішею
                        targetCard.style.transform = 'scale(0.9)';
                        setTimeout(() => targetCard.style.transform = '', 150);

                        const item = categoryData[itemIndex];
                        speakWord(item);
                        showWordText(item);
                        createSparkles(null, targetCard); // null, оскільки немає координати миші
                    }
                }
            }
        });
    </script>
</body>
</html>
