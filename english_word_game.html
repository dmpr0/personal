<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Word Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            /* Запобігаємо виділенню тексту та випадковому скролу на iPad */
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .card-pop {
            transition: transform 0.1s ease-in-out, background-color 0.1s ease-in-out;
        }

        /* Ефект спалаху при натисканні */
        .card-active-flash {
            transform: scale(0.92) !important;
            background-color: #fef08a !important; /* Яскравий жовтий спалах */
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card-pop:hover .emoji-animate {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }

        .sparkle-effect {
            position: absolute;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 0.6s ease-out forwards;
        }
    </style>
</head>

            </div>
        </header>

            <!-- Cards will be generated here -->

        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;

            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            if (availableVoices.length === 0) return;

            let filteredVoices = [];
            if (targetLanguage === 'be' || targetLanguage === 'uk') {
                filteredVoices = availableVoices.filter(voice => 
                    voice.lang.startsWith('uk') || voice.lang.startsWith('be') || voice.lang.startsWith('ru')
                );
            } else {
                filteredVoices = availableVoices.filter(voice => voice.lang.startsWith(targetLanguage));
            }

            const voicesToShow = filteredVoices.length > 0 ? filteredVoices : availableVoices;
            voiceSelect.innerHTML = ''; 

            voicesToShow.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speakWord(item) {
            window.speechSynthesis.cancel();
            
            // 1. Отримуємо слово для поточної обраної мови
            let wordToSpeak = (item[targetLanguage] || '');
            
            // 2. Очищаємо текст у дужках типу "(літера И)", щоб TTS вимовляв лише чисте слово (наприклад, "Сир")
            wordToSpeak = wordToSpeak.replace(/\s*\(.*?\)\s*/g, '').trim();
            
            // 3. Перетворюємо слово в нижній регістр (для літер це прибирає "Capital / Велика літера")
            if (currentCategory === 'letters' || currentCategory === 'letters_words') {
                wordToSpeak = wordToSpeak.toLowerCase();
            }
            
            // 4. Трюк для літери "і", щоб TTS не вимовляв "літера і"
            if (wordToSpeak === 'і' || wordToSpeak === 'i') {
                wordToSpeak = 'і.';
            }

            const utterance = new SpeechSynthesisUtterance(wordToSpeak);
            
            utterance.rate = 0.85; 
            utterance.pitch = 1.1;

            const voiceSelect = document.getElementById('voice-select');
            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                utterance.lang = selectedVoice.lang;
            } else {
                if (targetLanguage === 'en') utterance.lang = 'en-US';
                else if (targetLanguage === 'uk') utterance.lang = 'uk-UA';
                else utterance.lang = 'be-BY';
            }

            window.speechSynthesis.speak(utterance);
        }

            if (item.uk && targetLanguage !== 'uk') {

        function createSparkles(e, card) {

                sparkle.className = 'sparkle-effect';
                
                const rect = card.getBoundingClientRect();
                let x, y;
                
                if (e && e.clientX) {
                    x = e.clientX - rect.left + (Math.random() * 40 - 20);
                    y = e.clientY - rect.top + (Math.random() * 40 - 20);
                } else {
                    x = rect.width / 2 + (Math.random() * 40 - 20);
                    y = rect.height / 2 + (Math.random() * 40 - 20);
                }
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                
                card.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);
            }
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'clear') {
                    // Звук "Вуууш" при очищенні
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(350, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'stamp') {
                    // Веселий звук "Поп!" для штампу
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'color') {
                    // Звук бульбашки при зміні кольорів
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(260, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                }
            } catch(e) { 
                console.log("Audio contexts is not started or supported yet.", e); 
            }
        }

                                <button onclick="selectColor('#f97316', this)" class="draw-control w-10 h-10 rounded-full bg-orange-500 border-2 border-white shadow-md active:scale-95 transition-all"></button>
                                <button onclick="selectColor('#a855f7', this)" class="draw-control w-10 h-10 rounded-full bg-purple-500 border-2 border-white shadow-md active:scale-95 transition-all"></button>
                                <button onclick="selectColor('#ec4899', this)" class="draw-control w-10 h-10 rounded-full bg-pink-500 border-2 border-white shadow-md active:scale-95 transition-all"></button>
                                <button onclick="selectColor('#1f2937', this)" class="draw-control w-10 h-10 rounded-full bg-gray-800 border-2 border-white shadow-md active:scale-95 transition-all"></button>
                                <button onclick="selectColor('rainbow', this)" class="draw-control w-10 h-10 rounded-full bg-gradient-to-tr from-red-500 via-green-500 to-blue-500 border-2 border-white shadow-md active:scale-95 transition-all flex items-center justify-center text-sm" title="Веселка">🌈</button>
                            </div>
                        </div>

                        <!-- Розмір пензлика -->
                        <div class="flex flex-col gap-1 items-center shrink-0 border-l lg:border-l-0 lg:border-t-2 border-indigo-100 pl-3 lg:pl-0 lg:pt-3 w-auto lg:w-full">
                            <span class="text-xs font-black text-indigo-500 uppercase tracking-wider hidden lg:block mb-1">Пензлик</span>
                            <div class="flex gap-2">
                                <button onclick="selectSize(6, this)" class="size-btn w-9 h-9 rounded-xl bg-gray-50 border-2 border-white shadow-sm flex items-center justify-center font-black text-gray-700 text-xs active:scale-95 transition-all">✏️</button>
                                <button onclick="selectSize(14, this)" class="size-btn w-9 h-9 rounded-xl bg-indigo-100 border-2 border-white shadow-sm flex items-center justify-center font-black text-gray-700 text-sm active:scale-95 transition-all ring-2 ring-indigo-400">🖌️</button>
                                <button onclick="selectSize(24, this)" class="size-btn w-9 h-9 rounded-xl bg-gray-50 border-2 border-white shadow-sm flex items-center justify-center font-black text-gray-700 text-lg active:scale-95 transition-all">🖍️</button>
                            </div>
                        </div>

                        <!-- Штампи-стікери -->
                        <div class="flex flex-col gap-1 items-center shrink-0 border-l lg:border-l-0 lg:border-t-2 border-indigo-100 pl-3 lg:pl-0 lg:pt-3 w-auto lg:w-full">
                            <span class="text-xs font-black text-indigo-500 uppercase tracking-wider hidden lg:block mb-1">Штампи</span>
                            <div class="flex lg:grid lg:grid-cols-3 gap-1.5 justify-center">
                                <button onclick="selectStamp('🐶', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">🐶</button>
                                <button onclick="selectStamp('🍎', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">🍎</button>
                                <button onclick="selectStamp('🥦', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">🥦</button>
                                <button onclick="selectStamp('🚗', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">🚗</button>
                                <button onclick="selectStamp('🧸', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">🧸</button>
                                <button onclick="selectStamp('⭐', this)" class="draw-control stamp-btn w-10 h-10 rounded-xl bg-indigo-50/50 border-2 border-white shadow-sm flex items-center justify-center text-xl active:scale-95 transition-all">⭐</button>
                            </div>
                        </div>

                        <!-- Гумка та Стерти все -->
                        <div class="flex gap-2 lg:flex-col items-center shrink-0 border-l lg:border-l-0 lg:border-t-2 border-indigo-100 pl-3 lg:pl-0 lg:pt-3 w-auto lg:w-full">
                            <button onclick="selectColor('erase', this)" class="draw-control w-12 h-10 rounded-xl bg-gray-100 border-2 border-white shadow-md active:scale-95 transition-all flex items-center justify-center text-xl" title="Гумка">🧽</button>
                            <button onclick="clearCanvas()" class="w-12 h-10 rounded-xl bg-red-100 hover:bg-red-200 border-2 border-white shadow-md active:scale-95 transition-all flex items-center justify-center text-xl text-red-700" title="Стерти все">🗑️</button>
                        </div>

                    </div>
                    
                    <!-- Борд для малювання (Canvas) -->
                    <div class="flex-1 min-h-0 bg-white rounded-3xl border-4 border-indigo-300 relative overflow-hidden shadow-lg">
                        <canvas id="paintCanvas" class="w-full h-full block touch-none cursor-crosshair bg-white"></canvas>
                    </div>
                    
                </div>
            `;
            
            // Скидаємо стан малювання до початкового
            isDrawing = false;
            currentColor = '#ef4444';
            currentBrushSize = 14;
            drawMode = 'draw';
            
            // Налаштовуємо розмір полотна після завантаження дерева елементів
            setTimeout(() => {
                const canvas = document.getElementById('paintCanvas');
                if (canvas) {
                    const rect = canvas.parentNode.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    initCanvasDrawingEvents(canvas);
                }
            }, 80);
        }

        function initCanvasDrawingEvents(canvas) {
            const ctx = canvas.getContext('2d');
            
            function getCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function startDrawing(e) {
                isDrawing = true;
                const coords = getCoords(e);
                
                if (drawMode === 'stamp') {
                    drawSticker(coords.x, coords.y);
                    isDrawing = false; // Штамп ставиться одиночним тапом
                    return;
                }

                ctx.beginPath();
                ctx.moveTo(coords.x, coords.y);
                
                if (e.cancelable) e.preventDefault();
            }

            function draw(e) {
                if (!isDrawing) return;
                const coords = getCoords(e);

                if (drawMode === 'stamp') return;

                ctx.lineTo(coords.x, coords.y);
                
                // Визначаємо колір лінії
                if (drawMode === 'erase') {
                    ctx.strokeStyle = '#ffffff';
                } else if (currentColor === 'rainbow') {
                    rainbowHue = (rainbowHue + 4) % 360;
                    ctx.strokeStyle = `hsl(${rainbowHue}, 90%, 55%)`;
                } else {
                    ctx.strokeStyle = currentColor;
                }

                ctx.lineWidth = currentBrushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                if (e.cancelable) e.preventDefault();
            }

            function stopDrawing() {
                isDrawing = false;
                ctx.closePath();
            }

            function drawSticker(x, y) {
                ctx.save();
                // Масштабуємо розмір емодзі відповідно до обраного пензля
                ctx.font = `${currentBrushSize * 4}px 'Nunito', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(selectedStamp, x, y);
                ctx.restore();
                
                playSound('stamp');
                speakWord(stampTranslations[selectedStamp]);
            }

            // Використовуємо універсальні Pointer Events для миші та тач-екранів iPad
            if (window.PointerEvent) {
                canvas.addEventListener('pointerdown', startDrawing);
                canvas.addEventListener('pointermove', draw);
                canvas.addEventListener('pointerup', stopDrawing);
                canvas.addEventListener('pointercancel', stopDrawing);
            } else {
                canvas.addEventListener('touchstart', startDrawing);
                canvas.addEventListener('touchmove', draw);
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
            }
        }

        function renderGrid() {
            if (currentCategory === 'letters_words') {
                renderLettersWords();
                return;
            }

            if (currentCategory === 'drawing') {
                document.getElementById('pagination-controls').classList.add('hidden');
                renderDrawingBoard();
                return;
            }

            const gridContainer = document.getElementById('game-grid');
            const paginationControls = document.getElementById('pagination-controls');
            gridContainer.innerHTML = '';
            
            const categoryData = gameData[currentCategory];
            let allItems = categoryData.getItems ? categoryData.getItems(targetLanguage) : categoryData.items;

            let displayItems = allItems;
            const isPaginated = (currentCategory === 'letters' || currentCategory === 'numbers');

            if (isPaginated) {
                const startIndex = currentLetterPage * ITEMS_PER_PAGE;
                displayItems = allItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);
                
                paginationControls.classList.remove('hidden');
                document.getElementById('page-indicator').textContent = `${currentLetterPage + 1} / ${Math.ceil(allItems.length / ITEMS_PER_PAGE)}`;
                
                document.getElementById('prev-page-btn').style.opacity = currentLetterPage === 0 ? '0.3' : '1';
                document.getElementById('next-page-btn').style.opacity = currentLetterPage >= Math.ceil(allItems.length / ITEMS_PER_PAGE) - 1 ? '0.3' : '1';
            } else {
                paginationControls.classList.add('hidden');
            }

            // Класи сітки
            if (isPaginated) {
                gridContainer.className = "grid grid-cols-3 grid-rows-2 gap-3 md:gap-6 flex-1 min-h-0 w-full";
            } else {
                gridContainer.className = "grid grid-cols-3 grid-rows-4 md:grid-cols-4 md:grid-rows-3 gap-2 md:gap-4 flex-1 min-h-0 w-full";
            }

            displayItems.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = `card-pop w-full h-full relative overflow-hidden bg-white rounded-2xl md:rounded-3xl border-4 border-white shadow-md flex flex-col items-center justify-center p-1 group`;
                
                let borderColor = '#fde047'; 
                if(currentCategory === 'vegetables') borderColor = '#86efac';
                if(currentCategory === 'fruits') borderColor = '#fca5a5';
                if(currentCategory === 'toys') borderColor = '#c084fc';
                if(currentCategory === 'transport') borderColor = '#60a5fa';
                if(currentCategory === 'clothes') borderColor = '#f472b6';
                if(currentCategory === 'letters') borderColor = '#fdba74';
                if(currentCategory === 'numbers') borderColor = '#fda4af'; // Ніжно-рожева рамочка для цифр
                
                card.style.borderColor = borderColor;
                card.style.animation = `bounce-in 0.4s ease-out ${index * 0.05}s both`;

                if (isPaginated) {
                    // Стиль "Просто Буква або Цифра"
                    card.innerHTML = `<span class="emoji-animate text-8xl sm:text-9xl font-black text-gray-800 drop-shadow-sm">${item.emoji}</span>`;
                } else {
                    const translationText = targetLanguage === 'uk' ? item.en : item.uk;
                    card.innerHTML = `
                        <div class="absolute inset-0 opacity-0 group-hover:opacity-5 bg-black transition-opacity"></div>
                        <span class="emoji-animate text-5xl sm:text-6xl md:text-7xl mb-1">${item.emoji}</span>
                        <div class="flex flex-col items-center leading-tight w-full px-1">
                            <span class="text-base sm:text-lg md:text-xl font-black text-gray-800 capitalize truncate w-full text-center">${item[targetLanguage]}</span>
                            <span class="text-xs sm:text-sm md:text-base font-bold text-gray-400">(${translationText})</span>
                        </div>
                    `;
                }

                card.onclick = (e) => {
                    card.classList.add('card-active-flash');
                    setTimeout(() => card.classList.remove('card-active-flash'), 150);

                    speakWord(item);
                    showWordText(item);
                    createSparkles(e, card);
                };

                gridContainer.appendChild(card);
            });
        }

        // Керування навігацією
        document.getElementById('back-btn').onclick = () => {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('flex');
            document.getElementById('current-word').style.opacity = 0;
            document.getElementById('current-translation').style.opacity = 0;
        };

        // Кнопки сторінок
        document.getElementById('prev-page-btn').onclick = () => {
            if (currentCategory === 'letters' || currentCategory === 'numbers') {
                if (currentLetterPage > 0) {
                    currentLetterPage--;
                    renderGrid();
                }
            } else if (currentCategory === 'letters_words') {
                if (currentLettersWordsIndex > 0) {
                    currentLettersWordsIndex--;
                    renderGrid();
                }
            }
        };

        document.getElementById('next-page-btn').onclick = () => {
            if (currentCategory === 'letters' || currentCategory === 'numbers') {
                const allItems = gameData[currentCategory].getItems(targetLanguage);
                if (currentLetterPage < Math.ceil(allItems.length / ITEMS_PER_PAGE) - 1) {
                    currentLetterPage++;
                    renderGrid();
                }
            } else if (currentCategory === 'letters_words') {
                const langData = lettersWordsData[targetLanguage] || lettersWordsData['en'];
                if (currentLettersWordsIndex < langData.length - 1) {
                    currentLettersWordsIndex++;
                    renderGrid();
                }
            }
        };

        window.onload = () => {
            window.speechSynthesis.getVoices();
            populateVoiceList();
            renderHomeCategories();

            // Settings Modal logic
            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => modal.classList.remove('hidden');
            document.getElementById('close-settings').onclick = () => modal.classList.add('hidden');
            
            // Name change logic
            const nameInput = document.getElementById('child-name-input');
            const displayName = document.getElementById('display-name');
            nameInput.addEventListener('input', (e) => {
                displayName.textContent = e.target.value.trim() || 'Мія';
            });

            // Language change logic
            document.getElementById('language-select').onchange = (e) => {
                targetLanguage = e.target.value;
                currentLetterPage = 0; 
                currentLettersWordsIndex = 0;
                populateVoiceList();
                if (!document.getElementById('game-screen').classList.contains('hidden')) {
                    renderGrid(); 
                }
            };
        };

        // --- KEYBOARD SUPPORT ---
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // Ignore when editing name

            const isGameScreenActive = !document.getElementById('game-screen').classList.contains('hidden');
            const isSettingsActive = !document.getElementById('settings-modal').classList.contains('hidden');

            if (e.key === 'Escape') {
                if (isSettingsActive) document.getElementById('close-settings').click();
                else if (isGameScreenActive) document.getElementById('back-btn').click();
                return;
            }

            // Керування стрілками
            if (isGameScreenActive) {
                if (currentCategory === 'letters' || currentCategory === 'numbers' || currentCategory === 'letters_words') {
                    if (e.key === 'ArrowLeft') document.getElementById('prev-page-btn').click();
                    if (e.key === 'ArrowRight') document.getElementById('next-page-btn').click();
                }
            }

            // Пошук літер, цифр та слів за абеткою на клавіатурі
            if (isGameScreenActive && e.key.length === 1 && currentCategory !== 'drawing') {
                const pressedChar = e.key.toLowerCase();

                if (currentCategory === 'letters_words') {
                    const langData = lettersWordsData[targetLanguage] || lettersWordsData['en'];
                    const itemIndex = langData.findIndex(item => item.letter.toLowerCase() === pressedChar);
                    
                    if (itemIndex !== -1) {
                        currentLettersWordsIndex = itemIndex;
                        renderGrid();

                        const leftCard = document.querySelector('#game-grid .left-giant-card');
                        if (leftCard) {
                            leftCard.classList.add('card-active-flash');
                            setTimeout(() => leftCard.classList.remove('card-active-flash'), 150);
                            speakWord({ [targetLanguage]: langData[itemIndex].letter });
                            showWordText({ [targetLanguage]: langData[itemIndex].letter, uk: 'Буква' });
                            createSparkles(null, leftCard);
                        }
                    }
                } else {
                    let categoryData = (currentCategory === 'letters' || currentCategory === 'numbers') 
                        ? gameData[currentCategory].getItems(targetLanguage) 
                        : gameData[currentCategory].items;

                    let itemIndex = -1;

                    if (currentCategory === 'letters' || currentCategory === 'numbers') {
                        itemIndex = categoryData.findIndex(item => item.emoji.toLowerCase() === pressedChar);
                    } else {
                        itemIndex = categoryData.findIndex(item => item[targetLanguage].toLowerCase().startsWith(pressedChar));
                    }

                    if (itemIndex !== -1) {
                        if (currentCategory === 'letters' || currentCategory === 'numbers') {
                            const targetPage = Math.floor(itemIndex / ITEMS_PER_PAGE);
                            if (currentLetterPage !== targetPage) {
                                currentLetterPage = targetPage;
                                renderGrid();
                            }
                        }

                        const cards = document.querySelectorAll('#game-grid .card-pop');
                        const cardIndexOnScreen = (currentCategory === 'letters' || currentCategory === 'numbers') ? itemIndex % ITEMS_PER_PAGE : itemIndex;
                        const targetCard = cards[cardIndexOnScreen];

                        if (targetCard) {
                            targetCard.classList.add('card-active-flash');
                            setTimeout(() => targetCard.classList.remove('card-active-flash'), 150);

                            const item = categoryData[itemIndex];
                            speakWord(item);
                            showWordText(item);
                            createSparkles(null, targetCard);
                        }
                    }
                }
            }
        });
    </script>
