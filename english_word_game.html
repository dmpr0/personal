<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Word Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            /* Запобігаємо виділенню тексту та скролу */
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .card-pop {
            transition: transform 0.1s ease-in-out, background-color 0.1s ease-in-out;
        }

        /* Ефект спалаху при натисканні */
        .card-active-flash {
            transform: scale(0.92) !important;
            background-color: #fef08a !important; /* Яскравий спалах */
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card-pop:hover .emoji-animate {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }

        .sparkle-effect {
            position: absolute;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 0.6s ease-out forwards;
        }
    </style>
</head>

                    } else { // Belarusian
                        return [
                            { emoji: 'А', be: 'А' }, { emoji: 'Б', be: 'Б' }, { emoji: 'В', be: 'В' }, { emoji: 'Г', be: 'Г' }, { emoji: 'Д', be: 'Д' }, { emoji: 'Е', be: 'Е' }, { emoji: 'Ё', be: 'Ё' }, { emoji: 'Ж', be: 'Ж' }, { emoji: 'З', be: 'З' }, { emoji: 'І', be: 'І' }, { emoji: 'Й', be: 'Й' }, { emoji: 'К', be: 'К' }, { emoji: 'Л', be: 'Л' }, { emoji: 'М', be: 'М' }, { emoji: 'Н', be: 'Н' }, { emoji: 'О', be: 'О' }, { emoji: 'П', be: 'П' }, { emoji: 'Р', be: 'Р' }, { emoji: 'С', be: 'С' }, { emoji: 'Т', be: 'Т' }, { emoji: 'У', be: 'У' }, { emoji: 'Ў', be: 'Ў' }, { emoji: 'Ф', be: 'Ф' }, { emoji: 'Х', be: 'Х' }, { emoji: 'Ц', be: 'Ц' }, { emoji: 'Ч', be: 'Ч' }, { emoji: 'Ш', be: 'Ш' }, { emoji: 'Ы', be: 'Ы' }, { emoji: 'Ь', be: 'Ь' }, { emoji: 'Э', be: 'Э' }, { emoji: 'Ю', be: 'Ю' }, { emoji: 'Я', be: 'Я' }
                        ];
                    }
                }
            },
            letters_words: {
                id: 'letters_words', title: '🔤📖 Буква і слово', color: 'bg-teal-400 hover:bg-teal-500 text-teal-900 border-teal-300',
                items: [] // Обробляється динамічно з lettersWordsData
            }
        };

        let currentCategory = 'animals';
        let targetLanguage = 'en';
        let availableVoices = [];

        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;

            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            if (availableVoices.length === 0) return;

            let filteredVoices = [];
            if (targetLanguage === 'be' || targetLanguage === 'uk') {
                filteredVoices = availableVoices.filter(voice => 
                    voice.lang.startsWith('uk') || voice.lang.startsWith('be') || voice.lang.startsWith('ru')
                );
            } else {
                filteredVoices = availableVoices.filter(voice => voice.lang.startsWith(targetLanguage));
            }

            const voicesToShow = filteredVoices.length > 0 ? filteredVoices : availableVoices;
            voiceSelect.innerHTML = ''; 

            voicesToShow.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speakWord(item) {
            window.speechSynthesis.cancel();
            
            // Запобігаємо тому, щоб TTS казав "Capital A" або "Велика літера О" - перетворюємо все в нижній регістр
            const wordToSpeak = (item[targetLanguage] || '').toLowerCase();
            const utterance = new SpeechSynthesisUtterance(wordToSpeak);
            
            utterance.rate = 0.85; 
            utterance.pitch = 1.1;

            const voiceSelect = document.getElementById('voice-select');
            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                utterance.lang = selectedVoice.lang;
            } else {
                if (targetLanguage === 'en') utterance.lang = 'en-US';
                else if (targetLanguage === 'uk') utterance.lang = 'uk-UA';
                else utterance.lang = 'be-BY';
            }

            window.speechSynthesis.speak(utterance);
        }

        function showWordText(item) {
            const wordElement = document.getElementById('current-word');
            const translationElement = document.getElementById('current-translation');
            
            wordElement.className = `text-3xl md:text-5xl font-black transition-opacity duration-300 drop-shadow-sm mb-1 leading-none ${targetLanguage === 'en' ? 'text-blue-500' : 'text-red-500'}`;

            wordElement.textContent = item[targetLanguage];
            wordElement.style.opacity = 1;
            
            // Розумне відображення перекладу
            if (item.uk && targetLanguage !== 'uk') {
                translationElement.textContent = targetLanguage === 'en' ? item.uk : item.en;
                translationElement.style.opacity = 1;
            } else if (targetLanguage === 'uk' && item.en) {
                translationElement.textContent = item.en;
                translationElement.style.opacity = 1;
            } else {
                translationElement.style.opacity = 0;
            }

            if (window.wordTimeout) clearTimeout(window.wordTimeout);

            window.wordTimeout = setTimeout(() => {
                wordElement.style.opacity = 0;
                translationElement.style.opacity = 0;
            }, 2500);
        }

        function createSparkles(e, card) {
            for (let i = 0; i < 3; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-effect';
                
                const rect = card.getBoundingClientRect();
                let x, y;
                
                if (e && e.clientX) {
                    x = e.clientX - rect.left + (Math.random() * 40 - 20);
                    y = e.clientY - rect.top + (Math.random() * 40 - 20);
                } else {
                    x = rect.width / 2 + (Math.random() * 40 - 20);
                    y = rect.height / 2 + (Math.random() * 40 - 20);
                }
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                
                card.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);
            }
        }

        function renderHomeCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            Object.values(gameData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `${cat.color} rounded-3xl p-3 md:p-6 border-b-8 shadow-xl flex flex-col items-center justify-center gap-1 md:gap-3 transform hover:scale-105 active:scale-95 transition-transform`;
                
                const emoji = cat.title.split(' ')[0];
                const text = cat.title.substring(2);

                btn.innerHTML = `
                    <span class="text-5xl md:text-7xl drop-shadow-md">${emoji}</span>
                    <span class="text-base md:text-xl font-black tracking-wide leading-tight">${text}</span>
                `;
                
                btn.onclick = () => {
                    currentCategory = cat.id;
                    currentLetterPage = 0; 
                    currentLettersWordsIndex = 0;
                    document.getElementById('home-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    document.getElementById('game-screen').classList.add('flex');
                    renderGrid();
                };
                
                grid.appendChild(btn);
            });
        }

        function renderLettersWords() {
            const gridContainer = document.getElementById('game-grid');
            const paginationControls = document.getElementById('pagination-controls');
            gridContainer.innerHTML = '';
            
            const langData = lettersWordsData[targetLanguage] || lettersWordsData['en'];
            const currentItem = langData[currentLettersWordsIndex];

            // Налаштовуємо пагінацію
            paginationControls.classList.remove('hidden');
            document.getElementById('page-indicator').textContent = `${currentLettersWordsIndex + 1} / ${langData.length}`;
            document.getElementById('prev-page-btn').style.opacity = currentLettersWordsIndex === 0 ? '0.3' : '1';
            document.getElementById('next-page-btn').style.opacity = currentLettersWordsIndex >= langData.length - 1 ? '0.3' : '1';

            // Основна сітка: Ліва велика літера і три картки справа
            gridContainer.className = "grid grid-cols-1 md:grid-cols-2 gap-4 flex-1 min-h-0 w-full";

            // Ліва частина - Велика літера
            const leftCard = document.createElement('button');
            leftCard.className = "card-pop left-giant-card w-full h-full relative overflow-hidden bg-white rounded-3xl border-8 border-teal-400 shadow-lg flex flex-col items-center justify-center p-6";
            leftCard.innerHTML = `
                <span class="text-9xl md:text-[12rem] font-black text-teal-500 drop-shadow-md">${currentItem.letter}</span>
                <span class="text-lg md:text-2xl font-bold text-gray-400 mt-2">Натисни букву</span>
            `;
            leftCard.onclick = (e) => {
                leftCard.classList.add('card-active-flash');
                setTimeout(() => leftCard.classList.remove('card-active-flash'), 150);

                speakWord({ [targetLanguage]: currentItem.letter });
                showWordText({ [targetLanguage]: currentItem.letter, uk: 'Буква' });
                createSparkles(e, leftCard);
            };

            // Права частина - Три картки зі словами в стовпчик
            const rightContainer = document.createElement('div');
            rightContainer.className = "flex flex-col gap-3 justify-between h-full w-full";

            currentItem.words.forEach((wordObj, idx) => {
                const wordCard = document.createElement('button');
                wordCard.className = "card-pop w-full flex-1 relative overflow-hidden bg-white rounded-2xl border-4 border-teal-300 shadow-md flex items-center justify-start p-4 gap-6 group";
                
                // Перевіряємо мову інтерфейсу, щоб показати правильні підписи
                const mainWord = wordObj[targetLanguage] || wordObj.en;
                const subWord = targetLanguage === 'uk' ? wordObj.en : wordObj.uk;

                wordCard.innerHTML = `
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-5 bg-black transition-opacity"></div>
                    <span class="emoji-animate text-5xl md:text-6xl">${wordObj.emoji}</span>
                    <div class="flex flex-col items-start leading-tight">
                        <span class="text-xl md:text-3xl font-black text-gray-800 capitalize">${mainWord}</span>
                        <span class="text-sm md:text-lg font-bold text-gray-400 mt-1">(${subWord})</span>
                    </div>
                `;

                wordCard.onclick = (e) => {
                    wordCard.classList.add('card-active-flash');
                    setTimeout(() => wordCard.classList.remove('card-active-flash'), 150);

                    speakWord(wordObj);
                    showWordText(wordObj);
                    createSparkles(e, wordCard);
                };

                rightContainer.appendChild(wordCard);
            });

            gridContainer.appendChild(leftCard);
            gridContainer.appendChild(rightContainer);
        }

        function renderGrid() {
            if (currentCategory === 'letters_words') {
                renderLettersWords();
                return;
            }

            const gridContainer = document.getElementById('game-grid');
            const paginationControls = document.getElementById('pagination-controls');
            gridContainer.innerHTML = '';
            
            const categoryData = gameData[currentCategory];
            let allItems = categoryData.getItems ? categoryData.getItems(targetLanguage) : categoryData.items;

            let displayItems = allItems;

            if (currentCategory === 'letters') {
                const startIndex = currentLetterPage * ITEMS_PER_PAGE;
                displayItems = allItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);
                
                paginationControls.classList.remove('hidden');
                document.getElementById('page-indicator').textContent = `${currentLetterPage + 1} / ${Math.ceil(allItems.length / ITEMS_PER_PAGE)}`;
                
                document.getElementById('prev-page-btn').style.opacity = currentLetterPage === 0 ? '0.3' : '1';
                document.getElementById('next-page-btn').style.opacity = currentLetterPage >= Math.ceil(allItems.length / ITEMS_PER_PAGE) - 1 ? '0.3' : '1';
            } else {
                paginationControls.classList.add('hidden');
            }

            // Класи сітки
            if (currentCategory === 'letters') {
                gridContainer.className = "grid grid-cols-3 grid-rows-2 gap-3 md:gap-6 flex-1 min-h-0 w-full";
            } else {
                gridContainer.className = "grid grid-cols-3 grid-rows-4 md:grid-cols-4 md:grid-rows-3 gap-2 md:gap-4 flex-1 min-h-0 w-full";
            }

            displayItems.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = `card-pop w-full h-full relative overflow-hidden bg-white rounded-2xl md:rounded-3xl border-4 border-white shadow-md flex flex-col items-center justify-center p-1 group`;
                
                let borderColor = '#fde047'; 
                if(currentCategory === 'vegetables') borderColor = '#86efac';
                if(currentCategory === 'fruits') borderColor = '#fca5a5';
                if(currentCategory === 'toys') borderColor = '#c084fc';
                if(currentCategory === 'transport') borderColor = '#60a5fa';
                if(currentCategory === 'clothes') borderColor = '#f472b6';
                if(currentCategory === 'letters') borderColor = '#fdba74';
                
                card.style.borderColor = borderColor;
                card.style.animation = `bounce-in 0.4s ease-out ${index * 0.05}s both`;

                if (currentCategory === 'letters') {
                    card.innerHTML = `<span class="emoji-animate text-8xl sm:text-9xl font-black text-gray-800 drop-shadow-sm">${item.emoji}</span>`;
                } else {
                    const translationText = targetLanguage === 'uk' ? item.en : item.uk;
                    card.innerHTML = `
                        <div class="absolute inset-0 opacity-0 group-hover:opacity-5 bg-black transition-opacity"></div>
                        <span class="emoji-animate text-5xl sm:text-6xl md:text-7xl mb-1">${item.emoji}</span>
                        <div class="flex flex-col items-center leading-tight w-full px-1">
                            <span class="text-base sm:text-lg md:text-xl font-black text-gray-800 capitalize truncate w-full text-center">${item[targetLanguage]}</span>
                            <span class="text-xs sm:text-sm md:text-base font-bold text-gray-400">(${translationText})</span>
                        </div>
                    `;
                }

                card.onclick = (e) => {
                    card.classList.add('card-active-flash');
                    setTimeout(() => card.classList.remove('card-active-flash'), 150);

                    speakWord(item);
                    showWordText(item);
                    createSparkles(e, card);
                };

                gridContainer.appendChild(card);
            });
        }

        // Керування навігацією
        document.getElementById('back-btn').onclick = () => {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('flex');
            document.getElementById('current-word').style.opacity = 0;
            document.getElementById('current-translation').style.opacity = 0;
        };

        // Кнопки сторінок
        document.getElementById('prev-page-btn').onclick = () => {
            if (currentCategory === 'letters') {
                if (currentLetterPage > 0) {
                    currentLetterPage--;
                    renderGrid();
                }
            } else if (currentCategory === 'letters_words') {
                if (currentLettersWordsIndex > 0) {
                    currentLettersWordsIndex--;
                    renderGrid();
                }
            }
        };

        document.getElementById('next-page-btn').onclick = () => {
            if (currentCategory === 'letters') {
                const allItems = gameData.letters.getItems(targetLanguage);
                if (currentLetterPage < Math.ceil(allItems.length / ITEMS_PER_PAGE) - 1) {
                    currentLetterPage++;
                    renderGrid();
                }
            } else if (currentCategory === 'letters_words') {
                const langData = lettersWordsData[targetLanguage] || lettersWordsData['en'];
                if (currentLettersWordsIndex < langData.length - 1) {
                    currentLettersWordsIndex++;
                    renderGrid();
                }
            }
        };

        window.onload = () => {
            window.speechSynthesis.getVoices();
            populateVoiceList();
            renderHomeCategories();

            // Settings Modal logic
            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => modal.classList.remove('hidden');
            document.getElementById('close-settings').onclick = () => modal.classList.add('hidden');
            
            // Name change logic
            const nameInput = document.getElementById('child-name-input');
            const displayName = document.getElementById('display-name');
            nameInput.addEventListener('input', (e) => {
                displayName.textContent = e.target.value.trim() || 'Мія';
            });

            // Language change logic
            document.getElementById('language-select').onchange = (e) => {
                targetLanguage = e.target.value;
                currentLetterPage = 0; 
                currentLettersWordsIndex = 0;
                populateVoiceList();
                if (!document.getElementById('game-screen').classList.contains('hidden')) {
                    renderGrid(); 
                }
            };
        };

        // --- KEYBOARD SUPPORT ---
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // Ignore when editing name

            const isGameScreenActive = !document.getElementById('game-screen').classList.contains('hidden');
            const isSettingsActive = !document.getElementById('settings-modal').classList.contains('hidden');

            if (e.key === 'Escape') {
                if (isSettingsActive) document.getElementById('close-settings').click();
                else if (isGameScreenActive) document.getElementById('back-btn').click();
                return;
            }

            // Керування стрілками
            if (isGameScreenActive) {
                if (currentCategory === 'letters' || currentCategory === 'letters_words') {
                    if (e.key === 'ArrowLeft') document.getElementById('prev-page-btn').click();
                    if (e.key === 'ArrowRight') document.getElementById('next-page-btn').click();
                }
            }

            // Пошук літер та слів за абеткою на клавіатурі
            if (isGameScreenActive && e.key.length === 1) {
                const pressedChar = e.key.toLowerCase();

                if (currentCategory === 'letters_words') {
                    const langData = lettersWordsData[targetLanguage] || lettersWordsData['en'];
                    const itemIndex = langData.findIndex(item => item.letter.toLowerCase() === pressedChar);
                    
                    if (itemIndex !== -1) {
                        currentLettersWordsIndex = itemIndex;
                        renderGrid();

                        const leftCard = document.querySelector('#game-grid .left-giant-card');
                        if (leftCard) {
                            leftCard.classList.add('card-active-flash');
                            setTimeout(() => leftCard.classList.remove('card-active-flash'), 150);
                            speakWord({ [targetLanguage]: langData[itemIndex].letter });
                            showWordText({ [targetLanguage]: langData[itemIndex].letter, uk: 'Буква' });
                            createSparkles(null, leftCard);
                        }
                    }
                } else {
                    let categoryData = currentCategory === 'letters' 
                        ? gameData.letters.getItems(targetLanguage) 
                        : gameData[currentCategory].items;

                    let itemIndex = -1;

                    if (currentCategory === 'letters') {
                        itemIndex = categoryData.findIndex(item => item.emoji.toLowerCase() === pressedChar);
                    } else {
                        itemIndex = categoryData.findIndex(item => item[targetLanguage].toLowerCase().startsWith(pressedChar));
                    }

                    if (itemIndex !== -1) {
                        if (currentCategory === 'letters') {
                            const targetPage = Math.floor(itemIndex / ITEMS_PER_PAGE);
                            if (currentLetterPage !== targetPage) {
                                currentLetterPage = targetPage;
                                renderGrid();
                            }
                        }

                        const cards = document.querySelectorAll('#game-grid .card-pop');
                        const cardIndexOnScreen = currentCategory === 'letters' ? itemIndex % ITEMS_PER_PAGE : itemIndex;
                        const targetCard = cards[cardIndexOnScreen];

                        if (targetCard) {
                            targetCard.classList.add('card-active-flash');
                            setTimeout(() => targetCard.classList.remove('card-active-flash'), 150);

                            const item = categoryData[itemIndex];
                            speakWord(item);
                            showWordText(item);
                            createSparkles(null, targetCard);
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
