<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Word Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            /* Prevent text selection to feel more like an app */
            user-select: none; 
            -webkit-user-select: none;
        }

        .card-pop {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-pop:active {
            transform: scale(0.9);
        }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card-pop:hover .emoji-animate {
            transform: scale(1.2) rotate(5deg);
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }

        .sparkle-effect {
            position: absolute;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Settings Button -->
    <button id="settings-btn" class="fixed top-4 right-4 z-40 bg-white p-3 rounded-full shadow-lg border-2 border-green-200 hover:bg-green-50 text-2xl transition-transform hover:scale-110">
        ⚙️
    </button>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border-4 border-green-400">
            <h2 class="text-2xl font-black text-green-600 mb-6 text-center">Налаштування</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">🌍 Мова вивчення:</label>
                    <select id="language-select" class="w-full px-4 py-3 rounded-xl border-2 border-blue-200 bg-blue-50 text-gray-800 font-bold focus:outline-none focus:border-blue-500 shadow-inner appearance-none cursor-pointer">
                        <option value="en">🇬🇧 Англійська</option>
                        <option value="be">⚪🔴⚪ Білоруська</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">🗣️ Голос:</label>
                    <select id="voice-select" class="w-full px-4 py-3 rounded-xl border-2 border-green-200 bg-green-50 text-gray-800 font-bold focus:outline-none focus:border-green-500 shadow-inner appearance-none cursor-pointer truncate">
                        <option value="">Завантаження голосів...</option>
                    </select>
                </div>
            </div>

            <button id="close-settings" class="mt-8 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-md transition-colors text-lg">
                Готово
            </button>
        </div>
    </div>

    <div class="max-w-4xl w-full pt-4">

        <!-- Category Navigation -->
        <nav class="flex flex-wrap justify-center gap-4 mb-6" id="category-nav">
            <!-- Buttons will be generated here -->
        </nav>

        <!-- Current Word Display -->
        <div class="text-center mb-6 h-24 flex flex-col justify-center">
            <h2 id="current-word" class="text-4xl md:text-5xl font-black text-blue-500 opacity-0 transition-opacity duration-300 drop-shadow-sm">
                Word
            </h2>
            <p id="current-translation" class="text-xl md:text-2xl font-bold text-gray-500 opacity-0 transition-opacity duration-300 mt-1">
                Переклад
            </p>
        </div>

        <!-- Grid Container -->
        <main id="game-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 pb-12">
            <!-- Cards will be generated here -->
        </main>
        
    </div>

                    { emoji: '👗', en: 'Dress', be: 'Сукенка', uk: 'Сукня' },
                    { emoji: '🧦', en: 'Socks', be: 'Шкарпэткі', uk: 'Шкарпетки' },
                    { emoji: '👟', en: 'Shoes', be: 'Абутак', uk: 'Взуття' },
                    { emoji: '🧢', en: 'Hat', be: 'Шапка', uk: 'Шапка' },
                    { emoji: '🧣', en: 'Scarf', be: 'Шалік', uk: 'Шарф' },
                    { emoji: '🧤', en: 'Gloves', be: 'Пальчаткі', uk: 'Рукавички' },
                    { emoji: '🧥', en: 'Coat', be: 'Паліто', uk: 'Пальто' },
                    { emoji: '🩳', en: 'Shorts', be: 'Шорты', uk: 'Шорти' },
                    { emoji: '🥾', en: 'Boots', be: 'Боты', uk: 'Чоботи' },
                    { emoji: '👓', en: 'Glasses', be: 'Акуляры', uk: 'Окуляри' }
                ]
            }
        };

        let currentCategory = 'animals';
        let targetLanguage = 'en';
        let availableVoices = [];

        // Populate the voice dropdown based on selected language
        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;

            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            if (availableVoices.length === 0) return;

            // Filter voices by selected language
            let filteredVoices = [];
            
            if (targetLanguage === 'be') {
                // Для білоруської мови шукаємо білоруські, а також українські та російські голоси як альтернативу
                filteredVoices = availableVoices.filter(voice => 
                    voice.lang.startsWith('be') || 
                    voice.lang.startsWith('uk') || 
                    voice.lang.startsWith('ru')
                );
            } else {
                filteredVoices = availableVoices.filter(voice => voice.lang.startsWith(targetLanguage));
            }

            const voicesToShow = filteredVoices.length > 0 ? filteredVoices : availableVoices;

            voiceSelect.innerHTML = ''; 

            voicesToShow.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }

        // Handle async voice loading in some browsers
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // Function to speak the word in the target language
        function speakWord(item) {
            window.speechSynthesis.cancel();
            
            const word = item[targetLanguage];
            const utterance = new SpeechSynthesisUtterance(word);
            
            utterance.rate = 0.85; 
            utterance.pitch = 1.1;

            const voiceSelect = document.getElementById('voice-select');
            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
                // Встановлюємо мову відповідно до обраного голосу, щоб браузер правильно його застосував
                utterance.lang = selectedVoice.lang;
            } else {
                utterance.lang = targetLanguage === 'en' ? 'en-US' : 'be-BY';
            }

            window.speechSynthesis.speak(utterance);
        }

        // Function to display the word temporarily on screen
        function showWordText(item) {
            const wordElement = document.getElementById('current-word');
            const translationElement = document.getElementById('current-translation');
            
            // Set colors based on selected language for visual distinction
            if (targetLanguage === 'en') {
                wordElement.className = "text-4xl md:text-5xl font-black text-blue-500 transition-opacity duration-300 drop-shadow-sm";
            } else {
                wordElement.className = "text-4xl md:text-5xl font-black text-red-500 transition-opacity duration-300 drop-shadow-sm"; // Red for Belarusian
            }

            wordElement.textContent = item[targetLanguage];
            wordElement.style.opacity = 1;
            
            translationElement.textContent = item.uk;
            translationElement.style.opacity = 1;

            // Clear previous timeout if exists
            if (window.wordTimeout) {
                clearTimeout(window.wordTimeout);
            }

            // Hide words after 2.5 seconds
            window.wordTimeout = setTimeout(() => {
                wordElement.style.opacity = 0;
                translationElement.style.opacity = 0;
            }, 2500);
        }

        // Sparkle animation effect
        function createSparkles(e, card) {
            for (let i = 0; i < 3; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-effect';
                
                // Random position around the click
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left + (Math.random() * 40 - 20);
                const y = e.clientY - rect.top + (Math.random() * 40 - 20);
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                
                card.appendChild(sparkle);
                
                // Cleanup
                setTimeout(() => {
                    sparkle.remove();
                }, 600);
            }
        }

        // Render category buttons
        function renderNavigation() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = '';

            Object.values(gameData).forEach(cat => {
                const btn = document.createElement('button');
                const isSelected = currentCategory === cat.id;
                
                let baseClass = 'px-6 py-3 rounded-2xl font-bold text-lg md:text-xl transition-all shadow-md transform hover:-translate-y-1';
                
                if (isSelected) {
                    btn.className = `${baseClass} ${cat.color} ring-4 ring-offset-2 ring-${cat.color.split('-')[1]}-400 scale-105`;
                } else {
                    btn.className = `${baseClass} bg-white text-gray-600 hover:bg-gray-50 border-2 border-gray-200`;
                }
                
                btn.textContent = cat.title;
                btn.onclick = () => {
                    currentCategory = cat.id;
                    renderNavigation();
                    renderGrid();
                };
                
                nav.appendChild(btn);
            });
        }

        // Render the grid of items
        function renderGrid() {
            const gridContainer = document.getElementById('game-grid');
            gridContainer.innerHTML = '';
            
            const items = gameData[currentCategory].items;

            items.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = `card-pop relative overflow-hidden bg-white rounded-3xl border-4 border-white shadow-xl flex flex-col items-center justify-center p-3 md:p-6 aspect-square group`;
                
                // Set inline border color based on category for a fun look
                let borderColor = '#fde047'; // yellow default
                if(currentCategory === 'vegetables') borderColor = '#86efac';
                if(currentCategory === 'fruits') borderColor = '#fca5a5';
                if(currentCategory === 'toys') borderColor = '#c084fc';
                if(currentCategory === 'transport') borderColor = '#60a5fa';
                if(currentCategory === 'clothes') borderColor = '#f472b6';
                card.style.borderColor = borderColor;
                card.style.animation = `bounce-in 0.5s ease-out ${index * 0.05}s both`;

                card.innerHTML = `
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-10 bg-black transition-opacity"></div>
                    <span class="emoji-animate text-6xl md:text-7xl mb-2 md:mb-3">${item.emoji}</span>
                    <div class="flex flex-col items-center leading-tight w-full px-1">
                        <span class="text-lg md:text-2xl font-black text-gray-800 capitalize truncate w-full text-center">${item[targetLanguage]}</span>
                        <span class="text-sm md:text-base font-bold text-gray-400 mt-1">(${item.uk})</span>
                    </div>
                `;

                card.onclick = (e) => {
                    speakWord(item);
                    showWordText(item);
                    createSparkles(e, card);
                };

                gridContainer.appendChild(card);
            });
        }

        // Initialize the game
        window.onload = () => {
            window.speechSynthesis.getVoices();
            populateVoiceList();
            
            renderNavigation();
            renderGrid();

            // Settings Modal logic
            const modal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => modal.classList.remove('hidden');
            document.getElementById('close-settings').onclick = () => modal.classList.add('hidden');
            
            // Language change logic
            document.getElementById('language-select').onchange = (e) => {
                targetLanguage = e.target.value;
                populateVoiceList(); // Refresh voice list for new language
                renderGrid(); // Оновлюємо текст на картках для нової мови
                
                // Immediately update current word if visible
                const wordElement = document.getElementById('current-word');
                if(wordElement.style.opacity == 1) {
                    wordElement.style.opacity = 0;
                    document.getElementById('current-translation').style.opacity = 0;
                }
            };
        };
    </script>
</body>
</html>
