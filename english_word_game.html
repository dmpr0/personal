<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вивчай англійські слова!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        .card-pop {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card-pop:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        .card-pop:active {
            transform: scale(0.95);
        }

        .emoji-animate {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .card-pop:active .emoji-animate {
            transform: scale(1.2) rotate(-10deg);
        }

        /* Sparkle animation for correct clicks */
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
        
        .sparkle-effect {
            position: absolute;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <div class="max-w-4xl w-full">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black text-green-600 drop-shadow-md mb-2">
                🌟 Вивчай англійські слова! 🌟
            </h1>
            <p class="text-lg text-gray-700 font-bold">Натисни на картинку, щоб почути її назву!</p>
        </header>

        <!-- Voice Selector -->
        <div class="flex justify-center items-center gap-3 mb-6 bg-white p-3 rounded-2xl shadow-sm border-2 border-green-100 max-w-md mx-auto">
            <label for="voice-select" class="text-gray-700 font-bold text-lg whitespace-nowrap">🗣️ Голос:</label>
            <select id="voice-select" class="w-full px-3 py-2 rounded-xl border-2 border-green-300 bg-green-50 text-gray-800 font-bold focus:outline-none focus:border-green-500 shadow-inner appearance-none cursor-pointer truncate">
                <option value="">Завантаження голосів...</option>
            </select>
        </div>

        <!-- Category Navigation -->
        <nav class="flex flex-wrap justify-center gap-4 mb-8" id="category-nav">
            <!-- Buttons will be generated here -->
        </nav>

        <!-- Current Word Display -->
        <div class="text-center mb-8 h-16">
            <h2 id="current-word" class="text-4xl md:text-5xl font-black text-blue-500 opacity-0 transition-opacity duration-300">
                Word
            </h2>
        </div>

        <!-- Grid Container -->
        <main id="game-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 pb-12">
            <!-- Cards will be generated here -->
        </main>
        
    </div>

    <script>
        // Data containing categories, emojis, English words, and Ukrainian translations
        const gameData = {
            animals: {
                id: 'animals',
                title: '🐶 Тварини',
                color: 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900',
                items: [
                    { emoji: '🐶', en: 'Dog', uk: 'Собака' },
                    { emoji: '🐱', en: 'Cat', uk: 'Кіт' },
                    { emoji: '🐭', en: 'Mouse', uk: 'Миша' },
                    { emoji: '🐰', en: 'Rabbit', uk: 'Кролик' },
                    { emoji: '🦊', en: 'Fox', uk: 'Лисиця' },
                    { emoji: '🐻', en: 'Bear', uk: 'Ведмідь' },
                    { emoji: '🐼', en: 'Panda', uk: 'Панда' },
                    { emoji: '🦁', en: 'Lion', uk: 'Лев' },
                    { emoji: '🐮', en: 'Cow', uk: 'Корова' },
                    { emoji: '🐷', en: 'Pig', uk: 'Свиня' },
                    { emoji: '🐸', en: 'Frog', uk: 'Жаба' },
                    { emoji: '🐵', en: 'Monkey', uk: 'Мавпа' }
                ]
            },
            vegetables: {
                id: 'vegetables',
                title: '🥦 Овочі',
                color: 'bg-green-400 hover:bg-green-500 text-green-900',
                items: [
                    { emoji: '🥦', en: 'Broccoli', uk: 'Броколі' },
                    { emoji: '🥕', en: 'Carrot', uk: 'Морква' },
                    { emoji: '🌽', en: 'Corn', uk: 'Кукурудза' },
                    { emoji: '🍅', en: 'Tomato', uk: 'Помідор' },
                    { emoji: '🍆', en: 'Eggplant', uk: 'Баклажан' },
                    { emoji: '🥔', en: 'Potato', uk: 'Картопля' },
                    { emoji: '🧅', en: 'Onion', uk: 'Цибуля' },
                    { emoji: '🧄', en: 'Garlic', uk: 'Часник' },
                    { emoji: '🥒', en: 'Cucumber', uk: 'Огірок' },
                    { emoji: '🌶️', en: 'Pepper', uk: 'Перець' },
                    { emoji: '🥬', en: 'Lettuce', uk: 'Салат' },
                    { emoji: '🍄', en: 'Mushroom', uk: 'Гриб' }
                ]
            },
            fruits: {
                id: 'fruits',
                title: '🍎 Фрукти',
                color: 'bg-red-400 hover:bg-red-500 text-red-900',
                items: [
                    { emoji: '🍎', en: 'Apple', uk: 'Яблуко' },
                    { emoji: '🍌', en: 'Banana', uk: 'Банан' },
                    { emoji: '🍇', en: 'Grapes', uk: 'Виноград' },
                    { emoji: '🍓', en: 'Strawberry', uk: 'Полуниця' },
                    { emoji: '🍉', en: 'Watermelon', uk: 'Кавун' },
                    { emoji: '🍊', en: 'Orange', uk: 'Апельсин' },
                    { emoji: '🍋', en: 'Lemon', uk: 'Лимон' },
                    { emoji: '🍒', en: 'Cherry', uk: 'Вишня' },
                    { emoji: '🍑', en: 'Peach', uk: 'Персик' },
                    { emoji: '🍍', en: 'Pineapple', uk: 'Ананас' },
                    { emoji: '🥭', en: 'Mango', uk: 'Манго' },
                    { emoji: '🥥', en: 'Coconut', uk: 'Кокос' }
                ]
            }
        };

        let currentCategory = 'animals';
        let availableVoices = [];

        //        // Populate the voice dropdown
        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;

            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            if (availableVoices.length === 0) return; // Wait for onvoiceschanged to trigger

            // Filter for English voices to avoid clutter, or show all if none found
            const englishVoices = availableVoices.filter(voice => voice.lang.includes('en'));
            const voicesToShow = englishVoices.length > 0 ? englishVoices : availableVoices;

            voiceSelect.innerHTML = ''; // Clear default loading text

            voicesToShow.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                
                // Try to set a good default voice automatically
                if (voice.default || voice.name.includes('Google') || voice.name.includes('Samantha') || voice.name.includes('Zira')) {
                    option.selected = true;
                }
                
                voiceSelect.appendChild(option);
            });
        }

        // Handle async voice loading in some browsers (like Chrome & Safari)
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        //        // Function to speak the word in English
        function speakWord(word) {
            // Cancel any ongoing speech to avoid overlapping
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(word);
            
            // Try to force English language
            utterance.lang = 'en-US';
            
            // Adjust properties for kids (slightly slower, friendly pitch)
            utterance.rate = 0.85; 
            utterance.pitch = 1.1;

            // Get selected voice from dropdown
            const voiceSelect = document.getElementById('voice-select');
            const selectedVoiceName = voiceSelect.value;
            
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            } else {
                // Fallback if something goes wrong
                const fallbackVoice = availableVoices.find(voice => voice.lang.includes('en'));
                if (fallbackVoice) utterance.voice = fallbackVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Function to display the word temporarily on screen
        function showWordText(word) {
            const wordDisplay = document.getElementById('current-word');
            wordDisplay.textContent = word;
            wordDisplay.classList.remove('opacity-0');
            wordDisplay.classList.add('opacity-100', 'scale-110');
            
            setTimeout(() => {
                wordDisplay.classList.remove('scale-110');
            }, 200);

            // Hide word after 2 seconds
            if(window.wordTimeout) clearTimeout(window.wordTimeout);
            window.wordTimeout = setTimeout(() => {
                wordDisplay.classList.remove('opacity-100');
                wordDisplay.classList.add('opacity-0');
            }, 2000);
        }

        // Function to create visual sparkles on click
        function createSparkles(e, button) {
            const rect = button.getBoundingClientRect();
            for(let i=0; i<3; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-effect';
                
                // Randomize position around the click
                const x = e.clientX - rect.left + (Math.random() * 40 - 20);
                const y = e.clientY - rect.top + (Math.random() * 40 - 20);
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                
                button.appendChild(sparkle);
                
                // Remove sparkle after animation ends
                setTimeout(() => {
                    sparkle.remove();
                }, 600);
            }
        }

        // Render category buttons
        function renderNavigation() {
            const navContainer = document.getElementById('category-nav');
            navContainer.innerHTML = '';

            Object.values(gameData).forEach(category => {
                const btn = document.createElement('button');
                
                // Base classes
                let classes = `px-6 py-3 rounded-full font-bold text-lg md:text-xl transition-all duration-300 shadow-sm border-b-4 `;
                
                if (currentCategory === category.id) {
                    // Active state
                    classes += `${category.color} border-black/20 transform scale-105`;
                } else {
                    // Inactive state
                    classes += `bg-white hover:bg-gray-50 text-gray-600 border-gray-200 hover:-translate-y-1`;
                }

                btn.className = classes;
                btn.textContent = category.title;
                
                btn.onclick = () => {
                    currentCategory = category.id;
                    renderNavigation(); // Re-render nav to update styles
                    renderGrid();       // Re-render grid with new items
                };

                navContainer.appendChild(btn);
            });
        }

        // Render the grid of items
        function renderGrid() {
            const gridContainer = document.getElementById('game-grid');
            gridContainer.innerHTML = '';
            
            const items = gameData[currentCategory].items;
            const catColor = gameData[currentCategory].color.split(' ')[0]; // Get the base bg color class

            items.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = `card-pop relative overflow-hidden bg-white rounded-3xl border-4 border-white shadow-xl flex flex-col items-center justify-center p-4 md:p-6 aspect-square group`;
                
                // Set inline border color based on category for a fun look
                let borderColor = '#fde047'; // yellow default
                if(currentCategory === 'vegetables') borderColor = '#86efac';
                if(currentCategory === 'fruits') borderColor = '#fca5a5';
                card.style.borderColor = borderColor;
                card.style.animationDelay = `${index * 50}ms`; // Staggered animation if we added entry anims

                card.innerHTML = `
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-10 bg-black transition-opacity"></div>
                    <span class="emoji-animate text-6xl md:text-8xl mb-2">${item.emoji}</span>
                    <span class="text-lg md:text-xl font-bold text-gray-700 capitalize">${item.uk}</span>
                `;

                card.onclick = (e) => {
                    speakWord(item.en);
                    showWordText(item.en);
                    createSparkles(e, card);
                };

                gridContainer.appendChild(card);
            });
        }

        // Initialize the game
        window.onload = () => {
            // Pre-load voices (browser quirk: voices load asynchronously)
            window.speechSynthesis.getVoices();
            populateVoiceList();
            
            renderNavigation();
            renderGrid();
        };
    </script>
</body>
</html>
